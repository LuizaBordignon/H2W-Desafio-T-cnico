<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Cadastro de Clientes - H2W SYSTEMS</h1>

    <button id="btn-novo" onclick="abrirModal()">+ Novo Cliente</button>

    <table id="tabela-clientes">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="corpo-tabela">
      </tbody>
    </table>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-conteudo">
      <h2 id="modal-titulo">Novo Cliente</h2>

      <input type="hidden" id="cliente-id">

      <label>Nome</label>
      <input type="text" id="input-nome" placeholder="Nome completo">

      <label>E-mail</label>
      <input type="email" id="input-email" placeholder="email@exemplo.com">

      <label>Telefone</label>
      <input type="text" id="input-telefone" placeholder="48999999999">

      <div class="modal-botoes">
        <button onclick="salvarCliente()">Salvar</button>
        <button onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>
  
  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
